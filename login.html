<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple Login</title>
    <style>
        :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;--bg:#f5f7fb;--card:#fff;--accent:#2563eb}
        html,body{height:100%}
        body{display:flex;align-items:center;justify-content:center;background:var(--bg);margin:0;padding:24px}
        .card{width:320px;background:var(--card);border-radius:12px;padding:20px;box-shadow:0 6px 18px rgba(20,20,40,.08)}
        h1{font-size:18px;margin:0 0 12px}
        label{display:block;font-size:13px;margin-top:10px;color:#333}
        input[type="text"],input[type="password"],input[type="number"]{
            width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:8px;margin-top:6px;font-size:14px;box-sizing:border-box
        }
        .actions{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
        button{background:var(--accent);color:#fff;border:0;padding:10px 14px;border-radius:8px;font-weight:600;cursor:pointer}
        .note{font-size:12px;color:#666;margin-top:10px}
        .error{color:#b91c1c;font-size:13px;margin-top:8px}
    </style>
    <script src="public.js"></script>
    <script src="private.js"></script>
</head>
<body>
    <main class="card" role="main">
        <h1>Sign in</h1>

        <form id="loginForm" novalidate>
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required />

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />

            <label for="devId">Developer ID</label>
            <input id="devId" name="devId" type="text" inputmode="numeric" required />

            <div class="actions">
                <div style="flex:1">
                    <button type="submit">Continue</button>
                </div>
            </div>

            <div id="error" class="error" aria-live="polite" style="display:none"></div>
            <div class="note">Please obtain the Developer ID at wolfdream226@gmail.com</div>
        </form>
    </main>
    <script>
        (function(){

            const form = document.getElementById('loginForm');
            const err = document.getElementById('error');

            const REDIRECT_BASE = 'https://www.wolfstudios.ca/dev';

            const CREDENTIALS = {
                username: 'admin',
                password: 'devwolfstudios2025$',
                devId: '803918-AAB1-4C9F-9D2E-1234567890AB'
            };

            form.addEventListener('submit', function(e){
                e.preventDefault();
                err.style.display = 'none';
                err.textContent = '';

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value; 
                const devId = document.getElementById('devId').value.trim();

                if (!username || !password || !devId) {
                    err.textContent = 'Please enter username, password, and developer ID.';
                    err.style.display = 'block';
                    return;
                }

                if (
                    username !== CREDENTIALS.username ||
                    password !== CREDENTIALS.password ||
                    devId !== CREDENTIALS.devId
                ) {
                    err.textContent = 'Invalid credentials.';
                    err.style.display = 'block';
                    return;
                }

                const params = new URLSearchParams({
                    user: username,
                    devId: devId
                });

                const target = REDIRECT_BASE + '?' + params.toString();

                try {
                    sessionStorage.setItem('loggedInUser', username);
                    sessionStorage.setItem('developerId', devId);
                } catch (e) {}

                window.location.href = target;
            });
        })();
    </script>
</body>
</html>
