<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Image Gallery — Ancient Rome Archive</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="global.css">
  <script src="private.js"></script>
  <style>
    .gallery-wrap{max-width:1100px;margin:28px auto;padding:0 18px}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
    .img-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,0.08);cursor:pointer;display:flex;flex-direction:column}
    .img-thumb{background-size:cover;background-position:center;padding-top:66%;width:100%}
    .img-meta{padding:10px;font-size:.95rem;color:#333}
    .img-meta small{color:#777}

    .viewer{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.9);z-index:9999}
    .viewer.active{display:flex}
    .viewer img{max-width:95%;max-height:90%;border-radius:6px;box-shadow:0 18px 80px rgba(0,0,0,0.6)}
    .viewer .controls{position:fixed;top:18px;right:18px;color:#fff}
    .viewer .controls .close{background:rgba(0,0,0,0.45);padding:8px 10px;border-radius:6px;cursor:pointer}
    .viewer .nav{position:fixed;left:12px;right:12px;top:50%;display:flex;justify-content:space-between;pointer-events:none}
    .viewer .nav button{pointer-events:auto;background:rgba(255,255,255,0.06);border:0;color:#fff;padding:10px 12px;border-radius:6px;cursor:pointer}
    .backb {
      background: rgba(255, 255, 255, 0.1);
      border: 0;
      border-radius: 6px;
      color: #fff;
      padding: 8px 12px;
      text-decoration: none;
      transition: background 0.3s;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1>Full Image Gallery</h1>
    <p class="tag">All images are taken by nicholas machan and are original - click to expand</p>
    <p class="tag">These are the unfiltered gallery of images i took.</p>
    <a class="backb" href="index.html">Home</a>
  </header>

  <main class="gallery-wrap">
    <section id="gallery" class="gallery-grid" aria-live="polite">
      <!-- cards generated by script -->
    </section>
  </main>

  <div id="viewer" class="viewer" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="nav">
      <button id="prev" aria-label="Previous image">◀</button>
      <button id="next" aria-label="Next image">▶</button>
    </div>
    <img id="viewer-img" src="" alt="" />
    <div class="controls"><span class="close" id="close">✕</span></div>
  </div>

    ];

    const gallery = document.getElementById('gallery');
    const viewer = document.getElementById('viewer');
    const viewerImg = document.getElementById('viewer-img');
    const closeBtn = document.getElementById('close');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');

    let current = -1;

    function buildGallery(){
      IMAGES.forEach((img, i)=>{
        const card = document.createElement('div');
        card.className = 'img-card';
        card.innerHTML = `
          <div class="img-thumb" style="background-image:url('${img.src}')" data-index="${i}" aria-hidden="true"></div>
          <div class="img-meta"><strong>${img.title}</strong><br/><small>${img.src}</small></div>
        `;
        card.addEventListener('click', ()=>openViewer(i));
        gallery.appendChild(card);
      });
    }

    function openViewer(index){
      const entry = IMAGES[index];
      if(!entry) return;
      current = index;
      viewerImg.src = entry.src;
      viewerImg.alt = entry.title || '';
      viewer.classList.add('active');
      viewer.setAttribute('aria-hidden', 'false');
      closeBtn.focus();
    }

    function closeViewer(){
      viewer.classList.remove('active');
      viewer.setAttribute('aria-hidden', 'true');
      viewerImg.src = '';
      current = -1;
    }

    function showNext(delta){
      if(current === -1) return;
      current = (current + delta + IMAGES.length) % IMAGES.length;
      const entry = IMAGES[current];
      viewerImg.src = entry.src;
      viewerImg.alt = entry.title || '';
    }

    closeBtn.addEventListener('click', closeViewer);
    viewer.addEventListener('click', (e)=>{ if(e.target === viewer) closeViewer(); });
    prevBtn.addEventListener('click', ()=> showNext(-1));
    nextBtn.addEventListener('click', ()=> showNext(1));

    document.addEventListener('keydown', (e)=>{
      if(viewer.classList.contains('active')){
        if(e.key === 'Escape') closeViewer();
        if(e.key === 'ArrowRight') showNext(1);
        if(e.key === 'ArrowLeft') showNext(-1);
      }
    });

    buildGallery();
  </script>
