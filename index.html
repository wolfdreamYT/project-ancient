<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Ancient Archive</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="private.css" />
</head>
<body>
  <header class="site-header">
    <h1>The Ancient Archive</h1>
    <p class="tag">Explore people, places and events from Ancient Rome</p>
  </header>

  <main>
    <div class="controls">
      <input id="search" placeholder="Search people, places or events..." />
      <select id="filter">
        <option value="all">All</option>
        <option value="person">Person</option>
        <option value="place">Place</option>
        <option value="event">Event</option>
      </select>
    </div>

    <section class="hero-card" aria-label="Colosseum image collage">
      <div class="hero-item" data-src="coloseum1.png" title="The best of italy" style="display:grid;grid-template-columns:2fr 1fr;gap:6px;padding:12px;">
        <div class="collage-large" style="background-image:url('coloseum1.png');background-size:cover;background-position:center;border-radius:8px;min-height:260px"></div>
        <div class="collage-right" style="display:grid;gap:6px">
          <div class="collage-small" data-src="forum1.png" style="background-image:url('forum1.png');background-size:cover;background-position:center;border-radius:8px;min-height:126px"></div>
          <div class="collage-small" data-src="IMG_3257.png" style="background-image:url('IMG_3257.png');background-size:cover;background-position:center;border-radius:8px;min-height:126px"></div>
        </div>
      </div>
      <div class="hero-caption">
        <h2>NEW - The Best of Italy</h2>
        <p>Click here to look at hundreds of images taken by Nicholas Machan in Italy!</p>
        <p><a href="gallery.html">View the collection</a></p>
      </div>
    </section>

    <section id="cards" class="grid">
      <!-- Cards are generated by script -->
    </section>
  </main>

  <footer>
    <p>Project Ancient - The ultimate archive</p>
  </footer>

  <script src="app.js"></script>
  <script>
    (function(){
      function openImage(src){
        const overlay = document.createElement('div');
        overlay.className = 'img-overlay';
        overlay.innerHTML = `<div class="close">✕</div><img src="${src}" alt="" />`;
        overlay.addEventListener('click', e=>{ if(e.target === overlay || e.target.classList.contains('close')) overlay.remove(); });
        document.body.appendChild(overlay);
        window.addEventListener('keydown', function esc(e){ if(e.key === 'Escape'){ overlay.remove(); window.removeEventListener('keydown', esc); } });
      }

      document.querySelectorAll('.hero-item, .collage-small').forEach(el=>{
        el.addEventListener('click', (e)=>{
          const target = e.currentTarget;
          const src = target.getAttribute('data-src') || (target.style.backgroundImage && target.style.backgroundImage.slice(5,-2)) || 'coloseum1.png';
          openImage(src);
        });
      });
    })();
  </script>
</body>
</html>
